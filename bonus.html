<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<style>:root{color-scheme:light only;}</style>
<title>ログインボーナス — yuwa Bloom Realm</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Maru Gothic',sans-serif;background:#FAF8FF;min-height:100vh;}
.app{max-width:390px;margin:0 auto;padding:0 0 5rem;min-height:100vh;}
.top-bar{padding:1rem 1.25rem 0.75rem;display:flex;align-items:center;gap:10px;}
.back-btn{width:32px;height:32px;border-radius:50%;background:#EEEDFE;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.top-title{font-size:15px;font-weight:500;color:#26215C;}

.bonus-hero{
  margin:0 1.25rem 1.25rem;
  background:#EEEDFE;border:0.5px solid #AFA9EC;
  border-radius:20px;padding:1.5rem;text-align:center;
}
.bonus-day{font-size:11px;color:#534AB7;margin-bottom:8px;letter-spacing:0.06em;}
.bonus-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:#26215C;margin-bottom:12px;}
.point-display{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;}
.point-num{font-size:42px;font-weight:500;color:#534AB7;line-height:1;}
.point-label{font-size:13px;color:#7F77DD;margin-top:8px;}
.receive-btn{
  width:100%;padding:14px;font-size:15px;font-weight:500;
  font-family:inherit;background:#534AB7;color:#fff;
  border:none;border-radius:14px;cursor:pointer;
  letter-spacing:0.04em;transition:background 0.15s;
}
.receive-btn:hover{background:#3C3489;}
.receive-btn:disabled{background:#AFA9EC;cursor:not-allowed;}
.already-msg{font-size:12px;color:#7F77DD;margin-top:10px;}

.streak-section{margin:0 1.25rem 1.25rem;}
.section-label{font-size:11px;letter-spacing:0.08em;color:#888780;margin-bottom:10px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px;}
.day-cell{
  aspect-ratio:1;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:9px;gap:2px;
}
.day-cell.done{background:#534AB7;color:#fff;}
.day-cell.today{background:#7F77DD;color:#fff;border:2px solid #3C3489;}
.day-cell.empty{background:#F1EFE8;color:#B4B2A9;}
.day-name{font-size:8px;}
.day-check{font-size:10px;}

.milestone-section{margin:0 1.25rem 1.25rem;}
.milestone-card{
  background:#fff;border:0.5px solid #D3D1C7;
  border-radius:16px;padding:1rem 1.25rem;
  margin-bottom:8px;
  display:flex;align-items:center;gap:12px;
}
.milestone-icon{
  width:44px;height:44px;border-radius:12px;
  background:#EEEDFE;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;
}
.milestone-icon.achieved{background:#534AB7;}
.milestone-info{flex:1;}
.milestone-title{font-size:13px;font-weight:500;color:#2C2C2A;}
.milestone-desc{font-size:11px;color:#888780;margin-top:2px;}
.milestone-pt{font-size:13px;font-weight:500;color:#534AB7;flex-shrink:0;}
.milestone-done{font-size:11px;color:#1D9E75;flex-shrink:0;}

.shop-section{margin:0 1.25rem 1.25rem;}
.shop-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
.shop-card{
  background:#fff;border:0.5px solid #D3D1C7;
  border-radius:16px;padding:1rem;text-align:center;
  cursor:pointer;transition:border-color 0.15s;
}
.shop-card:hover{border-color:#AFA9EC;}
.shop-icon{font-size:28px;margin-bottom:8px;}
.shop-name{font-size:12px;font-weight:500;color:#2C2C2A;margin-bottom:4px;}
.shop-pt{font-size:11px;color:#534AB7;}
.shop-btn{
  margin-top:8px;padding:6px 12px;font-size:11px;
  font-family:inherit;background:#EEEDFE;color:#534AB7;
  border:none;border-radius:8px;cursor:pointer;width:100%;
}
.shop-btn:hover{background:#AFA9EC;color:#fff;}
.shop-btn:disabled{background:#F1EFE8;color:#B4B2A9;cursor:not-allowed;}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#534AB7;color:#fff;
  padding:12px 24px;border-radius:20px;
  font-size:13px;font-weight:500;
  display:none;z-index:100;
  animation:fadeInOut 2.5s ease-in-out forwards;
}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-10px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;}}

.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:#fff;border-top:0.5px solid #D3D1C7;display:flex;padding:8px 0 20px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 0;}
.nav-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;}
.nav-label{font-size:9px;color:#888780;}
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <button class="back-btn" onclick="location.href='index.html'">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="top-title">ログインボーナス</div>
  </div>

  <div class="bonus-hero">
    <div class="bonus-day" id="bonus-day"></div>
    <div class="bonus-title">今日のボーナスを受け取ろう ✦</div>
    <div class="point-display">
      <div>
        <div class="point-num" id="total-points">0</div>
        <div class="point-label">保有ポイント</div>
      </div>
    </div>
    <button class="receive-btn" id="receive-btn" onclick="receiveBonus()">+1pt 受け取る</button>
    <div class="already-msg" id="already-msg" style="display:none">✦ 今日はもう受け取ったよ。また明日ね！</div>
  </div>

  <div class="streak-section">
    <div class="section-label">今週の記録</div>
    <div class="week-grid" id="week-grid"></div>
  </div>

  <div class="milestone-section">
    <div class="section-label">ボーナスマイルストーン</div>
    <div class="milestone-card">
      <div class="milestone-icon" id="m7-icon">🌸</div>
      <div class="milestone-info">
        <div class="milestone-title">7日連続ログイン</div>
        <div class="milestone-desc">1週間続けたらボーナス！</div>
      </div>
      <div class="milestone-pt" id="m7-status">+10pt</div>
    </div>
    <div class="milestone-card">
      <div class="milestone-icon" id="m30-icon">👑</div>
      <div class="milestone-info">
        <div class="milestone-title">30日連続ログイン</div>
        <div class="milestone-desc">1ヶ月続けたら特大ボーナス！</div>
      </div>
      <div class="milestone-pt" id="m30-status">+50pt</div>
    </div>
  </div>

  <div class="shop-section">
    <div class="section-label">ポイントショップ</div>
    <div class="shop-grid">
      <div class="shop-card">
        <div class="shop-icon">🌟</div>
        <div class="shop-name">癒し画像1枚</div>
        <div class="shop-pt">7pt</div>
        <button class="shop-btn" onclick="buyItem('癒し画像', 7)">交換する</button>
      </div>
      <div class="shop-card">
        <div class="shop-icon">💌</div>
        <div class="shop-name">キャラの特別メッセージ</div>
        <div class="shop-pt">20pt</div>
        <button class="shop-btn" onclick="buyItem('キャラの特別メッセージ', 20)">交換する</button>
      </div>
      <div class="shop-card">
        <div class="shop-icon">💜</div>
        <div class="shop-name">ゆわからの限定アファメーション</div>
        <div class="shop-pt">50pt</div>
        <button class="shop-btn" onclick="buyItem('限定アファメーション', 50)">交換する</button>
      </div>
      <div class="shop-card">
        <div class="shop-icon">✨</div>
        <div class="shop-name">Mastery3日間お試し</div>
        <div class="shop-pt">100pt</div>
        <button class="shop-btn" onclick="buyItem('Masteryお試し', 100)">交換する</button>
      </div>
    </div>
  </div>

  <div style="padding:0 1.25rem;margin-bottom:1.5rem;">
    <button onclick="location.href='points.html'" style="width:100%;padding:13px;font-size:14px;font-weight:500;font-family:inherit;background:#EEEDFE;color:#534AB7;border:1px solid #AFA9EC;border-radius:14px;cursor:pointer;">
      ポイントを購入する 🌟
    </button>
  </div>

  <div style="height:2rem;"></div>

  <div class="nav-bar">
    <div class="nav-item" onclick="location.href='index.html'">
      <div class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L2 7v7h4v-4h4v4h4V7L8 2z" stroke="#888780" stroke-width="1.2" stroke-linejoin="round"/></svg>
      </div>
      <div class="nav-label">ホーム</div>
    </div>
    <div class="nav-item active">
      <div class="nav-icon" style="background:#EEEDFE;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2l1.5 3 3.5.5-2.5 2.5.5 3.5L8 10l-3 1.5.5-3.5L3 5.5 6.5 5z" stroke="#534AB7" stroke-width="1.2" stroke-linejoin="round"/></svg>
      </div>
      <div class="nav-label" style="color:#534AB7;">ボーナス</div>
    </div>
    <div class="nav-item" onclick="location.href='mypage.html'">
      <div class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2a4 4 0 100 8A4 4 0 008 2zM2 14c0-2 2.7-3 6-3s6 1 6 3" stroke="#888780" stroke-width="1.2" stroke-linecap="round"/></svg>
      </div>
      <div class="nav-label">マイページ</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const TODAY = (() => { const d = new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); })();
const DISPLAY_DATE = (() => { const d = new Date(); return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'; })();
document.getElementById('bonus-day').textContent = DISPLAY_DATE;

let points = parseInt(localStorage.getItem('yuwa_points') || '0');
let streak = parseInt(localStorage.getItem('yuwa_streak') || '0');
let lastLogin = localStorage.getItem('yuwa_last_login') || '';
const receivedToday = lastLogin === TODAY;

document.getElementById('total-points').textContent = points;

if (receivedToday) {
  document.getElementById('receive-btn').disabled = true;
  document.getElementById('receive-btn').textContent = '✦ 受け取り済み';
  document.getElementById('already-msg').style.display = 'block';
}

function receiveBonus() {
  const btn = document.getElementById('receive-btn');
  btn.disabled = true;

  points += 1;
  streak += 1;
  localStorage.setItem('yuwa_points', points);
  localStorage.setItem('yuwa_streak', streak);
  localStorage.setItem('yuwa_last_login', TODAY);

  let bonusMsg = '+1pt 受け取ったよ！';

  if (streak === 7) {
    points += 10;
    localStorage.setItem('yuwa_points', points);
    bonusMsg = '🌸 7日連続！+10ptボーナス！';
    document.getElementById('m7-icon').classList.add('achieved');
    document.getElementById('m7-status').textContent = '達成！';
  } else if (streak === 30) {
    points += 50;
    localStorage.setItem('yuwa_points', points);
    bonusMsg = '👑 30日連続！+50ptボーナス！';
    document.getElementById('m30-icon').classList.add('achieved');
    document.getElementById('m30-status').textContent = '達成！';
  }

  document.getElementById('total-points').textContent = points;
  btn.textContent = '✦ 受け取り済み';
  document.getElementById('already-msg').style.display = 'block';
  showToast(bonusMsg);
  renderWeek();
}

function renderWeek() {
  const days = ['月','火','水','木','金','土','日'];
  const today = new Date().getDay();
  const todayIdx = today === 0 ? 6 : today - 1;
  const grid = document.getElementById('week-grid');
  grid.innerHTML = days.map((d, i) => {
    let cls = 'day-cell empty';
    let check = '';
    if (i < todayIdx) { cls = 'day-cell done'; check = '✓'; }
    else if (i === todayIdx) { cls = receivedToday || lastLogin === TODAY ? 'day-cell done' : 'day-cell today'; check = receivedToday || lastLogin === TODAY ? '✓' : d; }
    return `<div class="${cls}"><div class="day-name">${d}</div><div class="day-check">${check || (i < todayIdx ? '' : i === todayIdx ? '' : '')}</div></div>`;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

function buyItem(name, cost) {
  if (points < cost) {
    showToast('ポイントが足りないよ！');
    return;
  }
  if (confirm(`「${name}」を${cost}ptで交換する？`)) {
    points -= cost;
    localStorage.setItem('yuwa_points', points);
    document.getElementById('total-points').textContent = points;
    showToast(`「${name}」と交換したよ！✦`);
  }
}

renderWeek();
</script>
</body>
</html>
